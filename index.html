<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم وكافتيريا تعليلة - المنيو الرسمي المحدث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --paper: #d2b48c; }
        body { font-family: 'Tajawal', sans-serif; background-color: #111; margin: 0; overflow: hidden; }
        
        .main-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page { display: none; height: 100%; width: 100%; position: relative; }
        .page.active { display: flex; flex-direction: column; }

        .text-layer {
            position: absolute;
            top: 60px;
            right: 0;
            width: 60%; /* تعديل العرض لترك مساحة للصور */
            height: calc(100% - 60px);
            padding: 20px 15px 100px 5px;
            z-index: 30;
            text-align: right;
            overflow-y: auto;
            direction: rtl;
        }

        .visual-layer {
            position: absolute;
            left: 0; /* يبدأ من الحافة اليسرى */
            top: 60px; /* أسفل الشريط العلوي */
            width: 40%; /* يأخذ 40% من عرض الشاشة */
            height: calc(100% - 60px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* توزيع المسافات بالتساوي بين الصور */
            align-items: center;
            pointer-events: none;
            padding-bottom: 20px;
        }

        .dish-float {
            width: 85%; /* عرض مناسب داخل المساحة المخصصة */
            max-height: 24%; /* منع الصورة من التمدد بشكل مفرط */
            filter: drop-shadow(8px 12px 15px rgba(0,0,0,0.4)); /* ظل واقعي للمجسمات المفرغة */
            object-fit: contain;
            transform: rotate(-4deg);
        }

        .cat-headline {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2.2rem;
            font-weight: 900;
            border-bottom: 5px solid #000;
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #000;
            line-height: 1.2;
        }

        .menu-row {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #111;
            display: block;
            border-bottom: 1px dashed rgba(0,0,0,0.2);
            padding-bottom: 2px;
        }

        .sub-divider {
            font-weight: 900;
            background: rgba(0,0,0,0.15);
            padding: 5px 10px;
            margin: 1.5rem 0 0.8rem 0;
            border-right: 6px solid #000;
            font-size: 1.1rem;
        }

        .top-navbar {
            background: #000;
            color: #fff;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            height: 60px;
        }

        .cats-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .cat-card-btn {
            background: rgba(0,0,0,0.03);
            border: 2px solid #000;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-card-btn:active { transform: scale(0.97); background: #000; color: #fff; }

        .hero-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <section id="welcome" class="page active">
        <div class="hero-box">
            <div class="border-[12px] border-black p-12 rotate-[-2deg] mb-12">
                <h1 class="text-7xl font-bold font-[Aref Ruqaa]">تعليلة</h1>
                <p class="text-2xl font-black mt-2 tracking-widest">مطعم وكافتيريا</p>
            </div>
            <button onclick="nav('categories')" class="bg-black text-white px-16 py-5 rounded-full text-2xl font-bold shadow-2xl">استكشف المنيو</button>
            <button onclick="nav('info')" class="mt-8 text-black font-black border-b-4 border-black text-xl">تواصل معنا</button>
        </div>
    </section>

    <section id="categories" class="page">
        <div class="top-navbar">
            <span class="text-xl font-bold font-[Aref Ruqaa]">أقسام تعليلة</span>
            <i class="fa-solid fa-utensils"></i>
        </div>
        <div class="cats-grid" id="cats-render-area"></div>
        <button onclick="nav('welcome')" class="p-4 bg-black text-white font-bold text-lg">العودة للرئيسية</button>
    </section>

    <section id="details" class="page">
        <div class="top-navbar">
            <button onclick="nav('categories')"><i class="fa-solid fa-arrow-right ml-2"></i> الأقسام</button>
            <span id="nav-label-active" class="font-bold"></span>
            <div class="w-10"></div>
        </div>
        <div class="visual-layer" id="images-render-area"></div>
        <div class="text-layer">
            <h2 id="cat-title-display" class="cat-headline"></h2>
            <div id="items-render-area"></div>
        </div>
    </section>

    <section id="info" class="page">
        <div class="top-navbar">
            <button onclick="nav('welcome')">الرئيسية</button>
            <span class="font-bold">تواصل معنا</span>
            <div class="w-10"></div>
        </div>
        <div class="p-8 flex flex-col gap-6 text-center overflow-y-auto" id="contact-render-area"></div>
    </section>

</div>

    const contactInfo = [
        { icon: "fa-whatsapp", label: "واتساب", value: "0955820800", color: "text-green-600" },
        { icon: "fa-facebook", label: "فيسبوك", value: "تعليلة_Taalia", color: "text-blue-800" },
        { icon: "fa-map-marker-alt", label: "العنوان", value: "دير الزور - الرشدية - شارع النهر", color: "text-red-700" }
    ];

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'categories') window.scrollTo(0,0);
    }

    function openCat(key) {
        const data = menuData[key];
        document.getElementById('nav-label-active').innerText = data.name;
        document.getElementById('cat-title-display').innerText = data.name;

        const imgSlot = document.getElementById('images-render-area');
        imgSlot.innerHTML = '';
        data.photos.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'dish-float';
            img.onerror = () => img.style.display = 'none';
            imgSlot.appendChild(img);
        });

        const listSlot = document.getElementById('items-render-area');
        listSlot.innerHTML = '';
        data.items.forEach(text => {
            if(text.includes('---')) {
                const div = document.createElement('div');
                div.className = 'sub-divider';
                div.innerText = text.replace(/-/g, '').trim();
                listSlot.appendChild(div);
            } else {
                const span = document.createElement('span');
                span.className = 'menu-row';
                span.innerText = text;
                listSlot.appendChild(span);
            }
        });

        nav('details');
        document.querySelector('.text-layer').scrollTop = 0;
    }

    function startup() {
        const catBox = document.getElementById('cats-render-area');
        Object.keys(menuData).forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'cat-card-btn';
            btn.innerText = menuData[key].name;
            btn.onclick = () => openCat(key);
            catBox.appendChild(btn);
        });

        const contactBox = document.getElementById('contact-render-area');
        contactInfo.forEach(c => {
            contactBox.innerHTML += `
                <div class="p-6 border-4 border-black rounded-3xl bg-white/10 mb-4">
                    <i class="fa-solid ${c.icon} text-5xl mb-3 ${c.color}"></i>
                    <p class="text-2xl font-black">${c.label}</p>
                    <p class="text-xl font-bold">${c.value}</p>
                </div>
            `;
        });
    }

    startup();

</html>
